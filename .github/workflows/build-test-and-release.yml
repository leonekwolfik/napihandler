name: Build, Test and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: napihandler-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact_name: napihandler-linux-arm64
          - os: macos-15-intel
            artifact_name: napihandler-macos-x86_64
          - os: macos-latest
            artifact_name: napihandler-macos-arm64
          - os: windows-latest
            artifact_name: napihandler-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            python build/build.py
          else
            python3 build/build.py
          fi

      - name: Rename binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            if [ -f dist/napihandler.exe ]; then
              mv dist/napihandler.exe dist/${{ matrix.artifact_name }}
            else
              mv dist/napihandler dist/${{ matrix.artifact_name }}
            fi
          else
            mv dist/napihandler dist/${{ matrix.artifact_name }}
          fi

      - name: Ad-hoc code sign (macOS only)
        if: runner.os == 'macOS'
        run: codesign --force --deep --sign - dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

      - name: Run tests
        shell: bash
        # Tests run against src/napihandler.py (available from the checkout).
        run: pytest test/ -v

  release:
    name: Create Release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Create Release and add files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "napihandler ${{ github.ref_name }}"
          body: |
            ## napihandler ${{ github.ref_name }}

            ### Downloads
            | System | Architecture | File |
            |--------|-------------|------|
            | Linux  | x86_64      | `napihandler-linux-x86_64` |
            | Linux  | arm64       | `napihandler-linux-arm64` |
            | macOS  | x86_64 (Intel) | `napihandler-macos-x86_64` |
            | macOS  | arm64 (Apple Silicon) | `napihandler-macos-arm64` |
            | Windows| x86_64      | `napihandler-windows-x86_64.exe` |

            ### Installation
            ```bash
            # Example for Linux x86_64
            chmod +x napihandler-linux-x86_64
            sudo mv napihandler-linux-x86_64 /usr/local/bin/napihandler

            # Example for macOS Apple Silicon
            chmod +x napihandler-macos-arm64
            sudo mv napihandler-macos-arm64 /usr/local/bin/napihandler

            # Example for Windows
            # Place napihandler-windows-x86_64.exe in your chosen folder
            ```
          files: |
            dist/napihandler-linux-x86_64/napihandler-linux-x86_64
            dist/napihandler-linux-arm64/napihandler-linux-arm64
            dist/napihandler-macos-x86_64/napihandler-macos-x86_64
            dist/napihandler-macos-arm64/napihandler-macos-arm64
            dist/napihandler-windows-x86_64.exe/napihandler-windows-x86_64.exe
          fail_on_unmatched_files: true

  publish-docker:
    name: Publish Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download linux/amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: napihandler-linux-x86_64
          path: dist/napihandler-linux-x86_64/

      - name: Download linux/arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: napihandler-linux-arm64
          path: dist/napihandler-linux-arm64/

      - name: Prepare binaries for Docker build
        run: |
          mkdir -p dist/linux-amd64 dist/linux-arm64
          cp dist/napihandler-linux-x86_64/napihandler-linux-x86_64 dist/linux-amd64/napihandler
          cp dist/napihandler-linux-arm64/napihandler-linux-arm64 dist/linux-arm64/napihandler
          chmod +x dist/linux-amd64/napihandler dist/linux-arm64/napihandler

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}