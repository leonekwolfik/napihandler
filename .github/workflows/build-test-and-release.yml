name: Build, Test and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: napihandler-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact_name: napihandler-linux-arm64
          - os: macos-15-intel
            artifact_name: napihandler-macos-x86_64
          - os: macos-latest
            artifact_name: napihandler-macos-arm64
          - os: windows-latest
            artifact_name: napihandler-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ustaw Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Zainstaluj zależności
        run: pip install -r requirements.txt

      - name: Zbuduj binarkę
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            python build/build.py
          else
            python3 build/build.py
          fi

      - name: Zmień nazwę binarki
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            if [ -f dist/napihandler.exe ]; then
              mv dist/napihandler.exe dist/${{ matrix.artifact_name }}
            else
              mv dist/napihandler dist/${{ matrix.artifact_name }}
            fi
          else
            mv dist/napihandler dist/${{ matrix.artifact_name }}
          fi

      - name: Testuj binarkę (sam hash)
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            dist/${{ matrix.artifact_name }} 07a1046ccddd59c0ffc7932331a16d63
          else
            ./dist/${{ matrix.artifact_name }} 07a1046ccddd59c0ffc7932331a16d63
          fi

      - name: Sprawdź plik srt
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            if [ -f *.srt ]; then echo "Plik srt znaleziony"; else exit 1; fi
          else
            test -f *.srt && echo "Plik srt znaleziony" || exit 1
          fi
          if [ "$RUNNER_OS" == "Windows" ]; then
            del *.srt 2>nul || true
          else
            rm -f *.srt
          fi

      - name: Testuj binarkę (napiprojekt:hash)
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            dist/${{ matrix.artifact_name }} napiprojekt:07a1046ccddd59c0ffc7932331a16d63
          else
            ./dist/${{ matrix.artifact_name }} napiprojekt:07a1046ccddd59c0ffc7932331a16d63
          fi

      - name: Sprawdź plik srt
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            if [ -f *.srt ]; then echo "Plik srt znaleziony"; else exit 1; fi
          else
            test -f *.srt && echo "Plik srt znaleziony" || exit 1
          fi
          if [ "$RUNNER_OS" == "Windows" ]; then
            del *.srt 2>nul || true
          else
            rm -f *.srt
          fi

      - name: Testuj rejestrację protokołu
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            dist/${{ matrix.artifact_name }} --register --dry-run
          else
            ./dist/${{ matrix.artifact_name }} --register --dry-run
          fi

  release:
    name: Utwórz Release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Pobierz artefakty
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Utwórz Release i dodaj pliki
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "napihandler ${{ github.ref_name }}"
          body: |
            ## napihandler ${{ github.ref_name }}

            ### Pobieranie
            | System | Architektura | Plik |
            |--------|-------------|------|
            | Linux  | x86_64      | `napihandler-linux-x86_64` |
            | Linux  | arm64       | `napihandler-linux-arm64` |
            | macOS  | x86_64 (Intel) | `napihandler-macos-x86_64` |
            | macOS  | arm64 (Apple Silicon) | `napihandler-macos-arm64` |
            | Windows| x86_64      | `napihandler-windows-x86_64.exe` |

            ### Instalacja
            ```bash
            # Przykład dla Linux x86_64
            chmod +x napihandler-linux-x86_64
            sudo mv napihandler-linux-x86_64 /usr/local/bin/napihandler

            # Przykład dla macOS Apple Silicon
            chmod +x napihandler-macos-arm64
            sudo mv napihandler-macos-arm64 /usr/local/bin/napihandler

            # Przykład dla Windows
            # Umieść napihandler-windows-x86_64.exe w wybranym folderze
            ```
          files: |
            dist/napihandler-linux-x86_64/napihandler-linux-x86_64
            dist/napihandler-linux-arm64/napihandler-linux-arm64
            dist/napihandler-macos-x86_64/napihandler-macos-x86_64
            dist/napihandler-macos-arm64/napihandler-macos-arm64
            dist/napihandler-windows-x86_64.exe/napihandler-windows-x86_64.exe
          fail_on_unmatched_files: true
