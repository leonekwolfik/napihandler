name: Mirror to GitLab

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
            git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/${{ secrets.GITLAB_USER }}/${{ github.event.repository.name }}.git
            git push gitlab --prune +refs/heads/*:refs/heads/* +refs/tags/*:refs/tags/*